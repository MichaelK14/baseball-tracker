{% extends 'core/base.html' %}
{% block title %}New Game{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>New Game</h2>
      <a href="{% url 'game_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
    <div class="card p-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Opponent</label>
          <input type="text" name="opponent" class="form-control" placeholder="e.g. Lincoln High School" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Date</label>
          <input type="date" name="date" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold d-block">Location</label>
          <div class="btn-group w-100" role="group">
            <input type="radio" class="btn-check" name="is_home" id="home" value="True" checked>
            <label class="btn btn-outline-success" for="home">Home</label>
            <input type="radio" class="btn-check" name="is_home" id="away" value="False">
            <label class="btn btn-outline-secondary" for="away">Away</label>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Notes <span class="text-muted fw-normal">(optional)</span></label>
          <textarea name="notes" class="form-control" rows="2" placeholder="Weather, field conditions, etc."></textarea>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-success btn-lg">Create Game & Set Lineup</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
